name: Database Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
      - name: Run SQLite tests
        run: |
          python -m pytest tests/unit/auth tests/integration/test_crm_mutation.py tests/integration/test_postgres_db.py -q

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: voice_crm
          POSTGRES_PASSWORD: voice_crm
          POSTGRES_DB: voice_crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U voice_crm -d voice_crm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://voice_crm:voice_crm@localhost:5432/voice_crm_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
      - name: Run PostgreSQL tests
        run: |
          python -m pytest tests/integration/test_postgres_db.py -m postgres -q
          python -m pytest tests/unit/auth tests/integration/test_crm_mutation.py -q
